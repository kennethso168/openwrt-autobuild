name: Build openwrt images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write # Required for creating releases and uploading assets
    
jobs:

  build:

    strategy:
      matrix:
        platform: ['x86-64', 'armsr-armv8']
      fail-fast: true

    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Openwrt version file
        id: get-openwrt-version
        run: echo "version=$(grep -o '^[^#]*' openwrt.version | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Read packages list for router
        id: get-pkg-list
        run: echo "pkgs=$(grep -o '^[^#]*' packages_router | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Download and deploy node exporter
        run: bash node_exporter.sh
        env:
          platform: ${{ matrix.platform }}

      - name: Display deployed files
        run: ls -R files

      - uses: kennethso168/openwrt-imagebuilder-action@a4a20ac1ced987ff442b5077bf8dd0589e89e906 # v7.0.1
        with:
          image: ${{ matrix.platform }}
          openwrt-version: ${{ steps.get-openwrt-version.outputs.version }}
          packages: ${{ steps.get-pkg-list.outputs.pkgs }}
          rootfs-size: 512

      - name: Store built packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.platform }}
          path: bin/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      - name: Display structure of downloaded files
        run: ls -R
      - name: Remove files not that are not images
        run: rm */sha256sums */profiles.json */*.bom.cdx.json */*.manifest
      - name: Display resulting structure again
        run: ls -R
      - name: Get current timestamp
        id: get-timestamp
        run: echo "ts=$(date '+%Y%m%d.%H%M%S')" >> $GITHUB_OUTPUT
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: build-${{ steps.get-timestamp.outputs.ts }}
          name: OpenWRT Build at ${{ steps.get-timestamp.outputs.ts }}
          draft: false
          prerelease: false
          files: |
            x86-64/*
            armsr-armv8/*
